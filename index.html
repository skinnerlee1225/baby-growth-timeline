<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶寶成長時間表 | Bảng theo dõi phát triển của bé</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","Noto Sans",sans-serif;background:#f5f5f0;color:#2c2c2a;line-height:1.8;font-size:17px}
.container{max-width:900px;margin:0 auto;padding:24px 20px}
header{text-align:center;padding:40px 20px 30px;background:linear-gradient(135deg,#E6F1FB,#E1F5EE);border-radius:20px;margin-bottom:28px}
header h1{font-size:28px;font-weight:600;margin-bottom:6px}
header .sub{font-size:18px;color:#5f5e5a;margin-bottom:8px}
.age-display{font-size:24px;font-weight:600;color:#185FA5;margin-top:12px}
.lang-switch{display:flex;justify-content:center;gap:8px;margin-bottom:28px;position:sticky;top:12px;z-index:10}
.lang-btn{padding:10px 24px;border-radius:12px;border:2px solid #d3d1c7;background:#fff;cursor:pointer;font-size:16px;font-weight:500;transition:all .2s;color:#5f5e5a}
.lang-btn:hover{border-color:#888780}
.lang-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.legend{display:flex;gap:20px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:15px;color:#5f5e5a}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.growth{background:#1D9E75}
.dot.dev{background:#7F77DD}
.dot.parent{background:#D85A30}
.current-card{background:#fff;border:2.5px solid #378ADD;border-radius:18px;padding:28px 28px 24px;margin-bottom:28px;box-shadow:0 2px 12px rgba(55,138,221,.12)}
.current-card .card-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.current-card .card-header h2{font-size:24px;font-weight:600;color:#185FA5}
.current-card .card-date{font-size:15px;color:#888780;margin-left:auto}
.badge{font-size:13px;padding:4px 14px;border-radius:8px;font-weight:500}
.badge.current{background:#E6F1FB;color:#185FA5}
.badge.past{background:#E1F5EE;color:#0F6E56}
.badge.future{background:#F1EFE8;color:#5f5e5a}
.section{margin-bottom:16px}
.section:last-child{margin-bottom:0}
.section-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;margin-bottom:6px}
.section-body{font-size:17px;line-height:1.9;padding-left:18px;color:#444441}
.personal-highlight{background:#FFF9E6;border-left:4px solid #EF9F27;border-radius:0 10px 10px 0;padding:14px 18px;margin-top:14px;font-size:16px;color:#633806;line-height:1.8}
.personal-highlight strong{color:#854F0B}
.qa-entry{border-top:2px dashed #EFD27F;margin-top:14px;padding-top:14px}
.qa-entry:first-child{border-top:none;margin-top:8px;padding-top:0}
.collapsible{border:1.5px solid #d3d1c7;border-radius:16px;margin-bottom:16px;overflow:hidden;background:#fff}
.collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;background:#fafaf7;user-select:none;transition:background .2s}
.collapsible-header:hover{background:#f0efe8}
.collapsible-header h3{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
.collapsible-header .arrow{transition:transform .3s;font-size:14px;color:#888780}
.collapsible-header .arrow.open{transform:rotate(180deg)}
.collapsible-header .count{font-size:14px;color:#888780;font-weight:400}
.collapsible-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.collapsible-body.open{max-height:none}
.collapsible-body .inner{padding:8px 16px 16px}
.mini-card{border:1px solid #e8e7e2;border-radius:12px;padding:18px 20px;margin-bottom:12px;background:#fff;cursor:pointer;transition:all .2s}
.mini-card:hover{border-color:#b4b2a9;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mini-card:last-child{margin-bottom:0}
.mini-card-header{display:flex;align-items:center;justify-content:space-between}
.mini-card-header h4{font-size:17px;font-weight:500;display:flex;align-items:center;gap:8px}
.mini-card-header .mini-date{font-size:14px;color:#888780}
.mini-card-header .mini-arrow{font-size:12px;color:#b4b2a9;transition:transform .3s}
.mini-card-header .mini-arrow.open{transform:rotate(180deg)}
.mini-card .mini-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.mini-card .mini-dot.past{background:#1D9E75}
.mini-card .mini-dot.future{background:#b4b2a9}
.mini-card-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.mini-card-body.open{max-height:none}
.mini-card-body .mini-inner{padding-top:14px}
footer{text-align:center;padding:32px 20px;color:#888780;font-size:14px;line-height:1.8}
@media(max-width:600px){
  body{font-size:16px}
  .container{padding:16px 12px}
  header h1{font-size:24px}
  .current-card{padding:20px 18px 18px}
  .collapsible-header{padding:14px 16px}
  .mini-card{padding:14px 16px}
  .current-card .card-date{margin-left:0;width:100%}
}
</style>
</head>
<body>
<div class="container">
<header>
  <h1 id="title"></h1>
  <div class="sub" id="subtitle"></div>
  <div class="age-display" id="baby-age"></div>
</header>

<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('zh')">繁體中文</button>
  <button class="lang-btn" onclick="setLang('vi')">Tiếng Việt</button>
</div>

<div class="legend" id="legend"></div>
<div id="current-section"></div>
<div id="past-section"></div>
<div id="future-section"></div>
<footer id="footer"></footer>
</div>

        parent: "Đặt lịch khám sức khỏe 9 tháng. Giới thiệu thêm các dạng thức ăn dặm (dạng miếng nhỏ). Bắt đầu dạy ngôn ngữ ký hiệu đơn giản (tạm biệt, muốn, không muốn). Khuyến khích bé khám phá nhưng chú ý an toàn. Bé có thể bắt đầu từ chối một số thức ăn — đây là điều bình thường."
      },
      {
        label: "10 tháng", date: "11/08 ~ 10/09/2026",
        growth: "Cân nặng khoảng 9~10,5 kg. Vịn đi linh hoạt hơn, một số bé có thể thử buông tay đứng vài giây. Răng cửa trên thường đã mọc.",
        dev: "Dùng ngón tay nhặt vật nhỏ chính xác. Biết chỉ tay vào thứ quan tâm. Bắt đầu thử nói từ có nghĩa đầu tiên (thường là \"ba ba\" hoặc \"ma ma\"). Có thể bỏ đồ vào hộp rồi lấy ra. Thích bắt chước gọi điện, uống nước như người lớn.",
        parent: "Thức ăn dặm gần giống thức ăn người lớn (miếng nhỏ mềm). Có thể cho bé tập ăn bằng bát và thìa (sẽ bừa bộn nhưng đáng để tập). Chú ý nguy cơ nuốt vật nhỏ. Tiếp tục nói chuyện với bé, đáp lại các âm thanh bé phát ra — giúp phát triển ngôn ngữ."
      },
      {
        label: "11 tháng", date: "11/09 ~ 10/10/2026",
        growth: "Cân nặng khoảng 9~11 kg. Khả năng phối hợp cơ thể tăng vượt bậc. Có thể đã đứng một mình vài giây hoặc thử bước đi.",
        dev: "Có thể bước những bước đầu tiên (nhưng đến 18 tháng mới biết đi vẫn bình thường). Hiểu mệnh lệnh phức tạp hơn, như \"đưa bóng cho ba\". Biết lật trang sách (nhiều trang một lúc). Biểu đạt cảm xúc phong phú hơn, dùng ngôn ngữ cơ thể để thể hiện suy nghĩ. Mong muốn tương tác xã hội tăng.",
        parent: "Chuẩn bị cho sinh nhật 1 tuổi — xem lại biểu đồ tăng trưởng và các mốc phát triển. Bắt đầu kế hoạch chuyển từ bình sữa sang cốc. Dần điều chỉnh lịch sinh hoạt còn 1 giấc ngủ trưa dài. Khuyến khích bé di chuyển nhiều, chuẩn bị môi trường tập đi an toàn."
      },
      {
        label: "Tròn 1 tuổi", date: "11/10/2026",
        growth: "Cân nặng gấp 3 lần lúc sinh (khoảng 9~12 kg), chiều dài khoảng 74~78 cm (gấp 1,5 lần lúc sinh). Thường đã có 6~8 răng sữa. Não đã phát triển bằng 60% người trưởng thành.",
        dev: "Hầu hết bé có thể tự đứng, một số đã đi được vài bước. Nói được 1~3 từ có nghĩa. Làm theo mệnh lệnh đơn giản. Chỉ tay vào thứ muốn lấy. Có sở thích và tính cách rõ ràng. Trí nhớ tốt hơn, nhớ vị trí đồ vật.",
        parent: "Đặt lịch khám sức khỏe và tiêm chủng 1 tuổi (thủy đậu, MMR, v.v.). Chế độ ăn gần giống người lớn, nhưng vẫn tránh thực phẩm có nguy cơ dị ứng cao ngoài mật ong. Có thể bắt đầu uống sữa tươi. Chúc mừng sinh nhật đầu tiên của bé! Nhìn lại một năm phát triển — bố mẹ đã làm rất tuyệt vời!"
      }
    ]
  }
};

let currentLang = 'zh';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(lang === 'zh' ? '中文' : 'Việt'));
  });
  render();
}

function getStatus(m) {
  const now = new Date();
  const d = new Date(2025, 9 + m, 11);
  if (m === 12) return now >= d ? 'past' : 'future';
  const next = new Date(2025, 9 + m + 1, 11);
  if (now >= next) return 'past';
  if (now >= d) return 'current';
  return 'future';
}

function calcAge() {
  const birth = new Date(2025, 9, 11, 12, 30);
  const now = new Date();
  let months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
  let days = now.getDate() - birth.getDate();
  if (days < 0) { months--; const prev = new Date(now.getFullYear(), now.getMonth(), 0); days += prev.getDate(); }
  return { months, days };
}

function toggleCollapsible(id) {
  const body = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function toggleMiniCard(id) {
  const body = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function buildSections(m, i, t) {
  const zhMonth = i18n.zh.months[i];
  let personalHtml = '';
  if (zhMonth.personalEntries && zhMonth.personalEntries.length > 0) {
    const entries = zhMonth.personalEntries.map((entry, idx) => {
      const text = currentLang === 'zh' ? entry.zh : entry.vi;
      return `<div class="qa-entry">${text}</div>`;
    }).join('');
    personalHtml = `<div class="personal-highlight"><strong>${currentLang === 'zh' ? '寶寶的個人紀錄' : 'Ghi chú cá nhân của bé'}</strong>${entries}</div>`;
  }
  return `
    <div class="section">
      <div class="section-title"><span class="dot growth"></span>${t.sectionTitles[0]}</div>
      <div class="section-body">${m.growth}</div>
    </div>
    <div class="section">
      <div class="section-title"><span class="dot dev"></span>${t.sectionTitles[1]}</div>
      <div class="section-body">${m.dev}</div>
    </div>
    <div class="section">
      <div class="section-title"><span class="dot parent"></span>${t.sectionTitles[2]}</div>
      <div class="section-body">${m.parent}</div>
    </div>
    ${personalHtml}
  `;
}

function render() {
  const t = i18n[currentLang];
  document.getElementById('title').textContent = t.title;
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('footer').textContent = t.footer;
  const age = calcAge();
  const ageEl = document.getElementById('baby-age');
  if (currentLang === 'zh') {
    ageEl.textContent = `寶寶今天：${age.months} 個月 ${age.days} 天`;
  } else {
    ageEl.textContent = `Bé hôm nay: ${age.months} tháng ${age.days} ngày`;
  }

  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  const dots = ['growth', 'dev', 'parent'];
  t.legend.forEach((l, i) => {
    legendEl.innerHTML += `<span class="legend-item"><span class="dot ${dots[i]}"></span>${l}</span>`;
  });

  const pastMonths = [];
  const currentMonths = [];
  const futureMonths = [];

  t.months.forEach((m, i) => {
    const s = getStatus(i);
    if (s === 'past') pastMonths.push({ m, i, s });
    else if (s === 'current') currentMonths.push({ m, i, s });
    else futureMonths.push({ m, i, s });
  });

  // Current section - always visible at top
  const currentEl = document.getElementById('current-section');
  currentEl.innerHTML = '';
  currentMonths.forEach(({ m, i }) => {
    currentEl.innerHTML += `
      <div class="current-card">
        <div class="card-header">
          <h2>${m.label}</h2>
          <span class="badge current">${t.badgeCurrent}</span>
          <span class="card-date">${m.date}</span>
        </div>
        ${buildSections(m, i, t)}
      </div>
    `;
  });

  // Past section - collapsible
  const pastEl = document.getElementById('past-section');
  pastEl.innerHTML = '';
  if (pastMonths.length > 0) {
    const firstLabel = pastMonths[0].m.label;
    const lastLabel = pastMonths[pastMonths.length - 1].m.label;
    let miniCards = '';
    pastMonths.forEach(({ m, i }, idx) => {
      miniCards += `
        <div class="mini-card" onclick="toggleMiniCard('past-mini-${idx}')">
          <div class="mini-card-header">
            <h4><span class="mini-dot past"></span>${m.label}</h4>
            <span class="mini-date">${m.date}</span>
            <span class="mini-arrow" id="past-mini-${idx}-arrow">&#9660;</span>
          </div>
          <div class="mini-card-body" id="past-mini-${idx}">
            <div class="mini-inner">${buildSections(m, i, t)}</div>
          </div>
        </div>
      `;
    });
    pastEl.innerHTML = `
      <div class="collapsible">
        <div class="collapsible-header" onclick="toggleCollapsible('past-body')">
          <h3><span class="arrow" id="past-body-arrow">&#9660;</span>${t.pastLabel}（${firstLabel} ~ ${lastLabel}）</h3>
          <span class="count">${pastMonths.length} ${currentLang === 'zh' ? '個月份' : 'tháng'}</span>
        </div>
        <div class="collapsible-body" id="past-body">
          <div class="inner">${miniCards}</div>
        </div>
      </div>
    `;
  }

  // Future section - collapsible
  const futureEl = document.getElementById('future-section');
  futureEl.innerHTML = '';
  if (futureMonths.length > 0) {
    const firstLabel = futureMonths[0].m.label;
    const lastLabel = futureMonths[futureMonths.length - 1].m.label;
    let miniCards = '';
    futureMonths.forEach(({ m, i }, idx) => {
      miniCards += `
        <div class="mini-card" onclick="toggleMiniCard('future-mini-${idx}')">
          <div class="mini-card-header">
            <h4><span class="mini-dot future"></span>${m.label}</h4>
            <span class="mini-date">${m.date}</span>
            <span class="mini-arrow" id="future-mini-${idx}-arrow">&#9660;</span>
          </div>
          <div class="mini-card-body" id="future-mini-${idx}">
            <div class="mini-inner">${buildSections(m, i, t)}</div>
          </div>
        </div>
      `;
    });
    futureEl.innerHTML = `
      <div class="collapsible">
        <div class="collapsible-header" onclick="toggleCollapsible('future-body')">
          <h3><span class="arrow" id="future-body-arrow">&#9660;</span>${t.futureLabel}（${firstLabel} ~ ${lastLabel}）</h3>
          <span class="count">${futureMonths.length} ${currentLang === 'zh' ? '個月份' : 'tháng'}</span>
        </div>
        <div class="collapsible-body" id="future-body">
          <div class="inner">${miniCards}</div>
        </div>
      </div>
    `;
  }
}

render();
</script>
</body>
</html>
